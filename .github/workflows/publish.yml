name: Publish Package to npmjs & GitHub Packages
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [created]

jobs:
  publish-npm-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 关键前置：删除package.json内publishConfig，彻底消除静态源优先级干扰
      - name: Remove publishConfig from package.json
        run: npm pkg delete publishConfig

      - name: Install dependencies
        run: npm ci

      # ========== 第一步：发布 GitHub Packages ==========
      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@jiangyuan1209'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: npm publish --access public

      # ========== 第二步：发布 npmjs.org ==========
      - name: Setup Node for npm official registry
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          scope: '@jiangyuan1209'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm official registry
        run: npm publish --access public