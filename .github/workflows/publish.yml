name: Publish Package to npmjs & GitHub Packages
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [created]

jobs:
  publish-npm-packages:
    runs-on: ubuntu-latest
    # 权限写在job内，保证GITHUB_TOKEN具备上传包权限
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@jiangyuan1209'

      - name: Install dependencies
        run: npm ci

      # GitHub Packages发布，强制注入内置GITHUB_TOKEN
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --registry=https://npm.pkg.github.com

      # npm官方源发布，使用仓库配置的NPM_TOKEN
      - name: Publish to npm official registry
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --registry=https://registry.npmjs.org --access public