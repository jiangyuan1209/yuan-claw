name: Publish Package to npmjs & GitHub Packages
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  release:
    types: [created]
permissions:
  contents: read
  packages: write

jobs:
  publish-npm-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          scope: '@jiangyuan1209'

      - name: Install dependencies
        run: npm ci

      # 第一步：发布 GitHub Packages，强制指定 registry + 内置GITHUB_TOKEN
      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --registry=https://npm.pkg.github.com

      # 第二步：发布 npmjs 官方源，使用NPM_TOKEN
      - name: Publish to npm official registry
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --registry=https://registry.npmjs.org --access public