name: Publish Package to npmjs & GitHub Packages
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  release:
    types: [created]
permissions:
  contents: read
  packages: write

jobs:
  publish-npm-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 关键：setup-node 必须配置 registry-url 才能让 GITHUB_TOKEN 自动鉴权 GH Packages
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@jiangyuan1209'

      - name: Install dependencies
        run: npm ci

      # 发布 GitHub Packages：setup-node 已自动绑定 GITHUB_TOKEN，无需手动传 env
      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com

      # 发布 npmjs 官方源，单独注入 NPM_TOKEN
      - name: Publish to npm official registry
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --registry=https://registry.npmjs.org --access public